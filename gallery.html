<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Gallery - Pamushana ZUNA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
            color: black;
        }

        header {
            background: #0a2a66;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header img {
            width: 120px;
        }

        nav {
            background: #133a8a;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        footer {
            background: #0a2a66;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            header img {
                width: 90px;
            }
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="Pamushana Logo">
    <h1>Events Gallery</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="index.html#about">About</a>
    <a href="gallery.html">Events</a>
    <a href="index.html#contact">Contact</a>
</nav>

<section>
    <h2>Our Events & Activities</h2>
    <p>Browse our recent events and activities from Pamushana ZUNA club.</p>
    
    <div class="gallery">
        <!-- Add your event images here -->
        <img src="event1.jpg" alt="Event 1">
        <img src="event2.jpg" alt="Event 2">
        <img src="event3.jpg" alt="Event 3">
        <img src="event4.jpg" alt="Event 4">
    </div>
</section>

<footer>
    <p>
        Designed by Israel Muvambwi | Contact: +263 787692906
    </p>
</footer>

</body>
</html>
